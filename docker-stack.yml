version: '3.9'

# Docker Swarm production stack for SMPI.
#
# Pré-requisitos (executar UMA VEZ antes do primeiro deploy):
#   docker swarm init --advertise-addr $(curl -s ifconfig.me)
#   docker network create --driver overlay --attachable traefik_public
#   docker network create --driver overlay --internal smpi_v1_internal
#   docker network create --driver overlay smpi_v1_egress
#
# Criar secrets (valores reais, nunca versionar):
#   printf '%s' "senha_forte"   | docker secret create smpi_db_password -
#   printf '%s' "senha_forte"   | docker secret create smpi_redis_password -
#   printf '%s' "senha_forte"   | docker secret create smpi_rabbit_password -
#   printf '%s' "senha_forte"   | docker secret create smpi_evolution_redis_password -
#   printf '%s' "sk-..."        | docker secret create smpi_openai_key -
#   printf '%s' "chave_forte"   | docker secret create smpi_django_secret -
#   printf '%s' "api_key"       | docker secret create smpi_evolution_key -
#   printf '%s' "cf_token"      | docker secret create CLOUDFLARE_DNS_API_TOKEN -
#
# Deploy:
#   ./scripts/deploy.sh
#
# DOMAIN no .env deve ser o domínio-raiz, sem www: DOMAIN=techteo.com.br

secrets:
  smpi_db_password:
    external: true
  smpi_redis_password:
    external: true
  smpi_rabbit_password:
    external: true
  smpi_evolution_redis_password:
    external: true
  smpi_openai_key:
    external: true
  smpi_django_secret:
    external: true
  smpi_evolution_key:
    external: true
  CLOUDFLARE_DNS_API_TOKEN:
    external: true

networks:
  traefik_public:
    external: true
  smpi_v1_internal:
    external: true
  smpi_v1_egress:
    external: true

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  media_data:
  staticfiles_data:
  evolution_redis_data:
  model_cache:
  letsencrypt:

services:
  # ─────────────────────────────── Traefik ────────────────────────────────────
  traefik:
    image: traefik:v3.1
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    secrets:
      - CLOUDFLARE_DNS_API_TOKEN
    environment:
      CF_DNS_API_TOKEN_FILE: /run/secrets/CLOUDFLARE_DNS_API_TOKEN
    command:
      - "--api.dashboard=true"
      - "--providers.swarm=true"
      - "--providers.swarm.exposedByDefault=false"
      - "--providers.swarm.network=traefik_public"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.cloudflare.acme.dnschallenge=true"
      - "--certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.cloudflare.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
      - "--certificatesresolvers.cloudflare.acme.email=renatoteodoro2@gmail.com"
      - "--certificatesresolvers.cloudflare.acme.storage=/letsencrypt/acme.json"
      - "--log.level=ERROR"
    networks:
      - traefik_public
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN:-techteo.com.br}`)"
        - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
        - "traefik.http.routers.traefik-dashboard.tls.certresolver=cloudflare"
        - "traefik.http.routers.traefik-dashboard.service=api@internal"
        - "traefik.http.routers.traefik-dashboard.middlewares=traefik-auth"
        - "traefik.http.middlewares.traefik-auth.basicauth.users=admin:$$apr1$$CHANGEME"

  # ────────────────────────────────── Django app ──────────────────────────────
  app:
    image: ${IMAGE:-smpi_app:latest}
    command: >
      sh scripts/entrypoint.sh
      gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120
    volumes:
      - media_data:/app/media
      - staticfiles_data:/app/staticfiles
      - model_cache:/app/ml_artifacts
    env_file: .env
    secrets:
      - smpi_db_password
      - smpi_redis_password
      - smpi_rabbit_password
      - smpi_openai_key
      - smpi_django_secret
      - smpi_evolution_key
    networks:
      - traefik_public
      - smpi_v1_internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
        order: stop-first
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 256M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.smpi.rule=Host(`${DOMAIN:-techteo.com.br}`) || Host(`www.${DOMAIN:-techteo.com.br}`)"
        - "traefik.http.routers.smpi.entrypoints=websecure"
        - "traefik.http.routers.smpi.tls=true"
        - "traefik.http.routers.smpi.tls.certresolver=cloudflare"
        - "traefik.http.routers.smpi.tls.domains[0].main=${DOMAIN:-techteo.com.br}"
        - "traefik.http.routers.smpi.tls.domains[0].sans=*.${DOMAIN:-techteo.com.br}"
        - "traefik.http.services.smpi.loadbalancer.server.port=8000"

  # ─────────────────────────────── PostgreSQL + pgvector ──────────────────────
  postgresql:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smpi}
      POSTGRES_USER: ${POSTGRES_USER:-smpi}
      POSTGRES_PASSWORD_FILE: /run/secrets/smpi_db_password
    secrets:
      - smpi_db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      smpi_v1_internal:
        aliases:
          - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smpi} -d ${POSTGRES_DB:-smpi}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 128M

  # ─────────────────────────────────── Redis ──────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      sh -c "redis-server --requirepass $$(cat /run/secrets/smpi_redis_password)"
    secrets:
      - smpi_redis_password
    volumes:
      - redis_data:/data
    networks:
      - smpi_v1_internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$(cat /run/secrets/smpi_redis_password) ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 64M

  # ─────────────────────────────── RabbitMQ ───────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    # RABBITMQ_DEFAULT_PASS_FILE is deprecated and causes exit in newer images.
    # Wrapper reads the secret and sets RABBITMQ_DEFAULT_PASS before the real entrypoint runs.
    entrypoint:
      - sh
      - -c
      - >
        export RABBITMQ_DEFAULT_PASS=$$(cat /run/secrets/smpi_rabbit_password) &&
        exec docker-entrypoint.sh rabbitmq-server
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-smpi}
    secrets:
      - smpi_rabbit_password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - smpi_v1_internal
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 64M

  # ─────────────────────────────── Celery Worker ──────────────────────────────
  celery_worker:
    image: ${IMAGE:-smpi_app:latest}
    command: celery -A core worker -l info --concurrency 4
    volumes:
      - media_data:/app/media
      - model_cache:/app/ml_artifacts
    env_file: .env
    secrets:
      - smpi_db_password
      - smpi_redis_password
      - smpi_rabbit_password
      - smpi_openai_key
      - smpi_evolution_key
      - smpi_django_secret
    networks:
      - smpi_v1_internal
      - smpi_v1_egress
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ─────────────────────────────── Celery Beat ────────────────────────────────
  celery_beat:
    image: ${IMAGE:-smpi_app:latest}
    command: celery -A core beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    secrets:
      - smpi_db_password
      - smpi_redis_password
      - smpi_rabbit_password
      - smpi_django_secret
    networks:
      - smpi_v1_internal
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          memory: 64M

  # ─────────────────── Evolution Redis (cache isolado) ────────────────────────
  evolution_redis:
    image: redis:7-alpine
    command: >
      sh -c "redis-server --requirepass $$(cat /run/secrets/smpi_evolution_redis_password) --maxmemory 128mb --maxmemory-policy allkeys-lru"
    secrets:
      - smpi_evolution_redis_password
    volumes:
      - evolution_redis_data:/data
    networks:
      - smpi_v1_internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$(cat /run/secrets/smpi_evolution_redis_password) ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          memory: 192M
        reservations:
          memory: 64M

  # ──────────────────────────────── Evolution API ─────────────────────────────
  # Para conectar ao WhatsApp em produção:
  #   1. Acesse por SSH tunnel: ssh -L 8080:localhost:8080 user@vps
  #   2. Abra http://localhost:8080/manager no navegador
  #   3. Login com EVOLUTION_API_KEY (valor do secret smpi_evolution_key / .env EVOLUTION_API_KEY)
  #   4. Crie a instância "smpi" e escaneie o QR code
  evolution_api:
    image: evoapicloud/evolution-api:latest
    environment:
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      DEL_INSTANCE: "false"
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: "postgresql://${POSTGRES_USER:-smpi}:${POSTGRES_PASSWORD}@postgresql:5432/${POSTGRES_DB:-smpi}?schema=evolution_api"
      DATABASE_CONNECTION_CLIENT_NAME: evolution_api
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://:${EVOLUTION_REDIS_PASSWORD}@evolution_redis:6379
      CACHE_LOCAL_ENABLED: "false"
      CONFIG_SESSION_PHONE_VERSION: "2.3000.1015901307"
      WEBHOOK_GLOBAL_URL: "https://www.${DOMAIN:-techteo.com.br}/webhooks/whatsapp/"
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_MESSAGES_UPDATE: "true"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"
      QRCODE_LIMIT: "30"
      LOG_LEVEL: ERROR
    networks:
      - smpi_v1_internal
      - smpi_v1_egress
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 128M
