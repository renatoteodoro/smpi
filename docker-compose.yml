version: '3.9'

services:
  # -----------------------------------------------------------------------
  # PostgreSQL with pgvector
  # -----------------------------------------------------------------------
  postgresql:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smpi}
      POSTGRES_USER: ${POSTGRES_USER:-smpi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smpi_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smpi} -d ${POSTGRES_DB:-smpi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------------
  # Redis (cache + Celery result backend)
  # -----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-smpi_redis_pass}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-smpi_redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------------
  # RabbitMQ (Celery broker)
  # -----------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-smpi}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-smpi_rabbit_pass}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 15s
      timeout: 10s
      retries: 5

  # -----------------------------------------------------------------------
  # Django application
  # -----------------------------------------------------------------------
  app:
    build: .
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120 --reload
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-smpi}:${POSTGRES_PASSWORD:-smpi_dev_password}@postgresql:5432/${POSTGRES_DB:-smpi}
      CELERY_BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER:-smpi}:${RABBITMQ_DEFAULT_PASS:-smpi_rabbit_pass}@rabbitmq:5672/
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-smpi_redis_pass}@redis:6379/0
      REDIS_URL: redis://:${REDIS_PASSWORD:-smpi_redis_pass}@redis:6379/1
      EVOLUTION_API_URL: http://evolution_api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-smpi-evolution-key-2024}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-smpi}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # -----------------------------------------------------------------------
  # Celery Worker
  # -----------------------------------------------------------------------
  celery_worker:
    build: .
    command: celery -A core worker -l info --concurrency 4
    volumes:
      - .:/app
      - media_data:/app/media
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-smpi}:${POSTGRES_PASSWORD:-smpi_dev_password}@postgresql:5432/${POSTGRES_DB:-smpi}
      CELERY_BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER:-smpi}:${RABBITMQ_DEFAULT_PASS:-smpi_rabbit_pass}@rabbitmq:5672/
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-smpi_redis_pass}@redis:6379/0
      REDIS_URL: redis://:${REDIS_PASSWORD:-smpi_redis_pass}@redis:6379/1
      EVOLUTION_API_URL: http://evolution_api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-smpi-evolution-key-2024}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-smpi}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # -----------------------------------------------------------------------
  # Evolution API (WhatsApp)
  # -----------------------------------------------------------------------
  evolution_api:
    image: atendai/evolution-api:latest
    ports:
      - "8080:8080"
    volumes:
      - evolution_data:/evolution/instances
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-smpi-evolution-key-2024}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      # Database (PostgreSQL compartilhado — Prisma cria suas próprias tabelas)
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER:-smpi}:${POSTGRES_PASSWORD:-smpi_dev_password}@postgresql:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      # Cache
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://:${REDIS_PASSWORD:-smpi_redis_pass}@redis:6379/3
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "false"
      # Webhook global desativado (configurado por instância)
      WEBHOOK_GLOBAL_ENABLED: "false"
      QRCODE_LIMIT: "30"
      LOG_LEVEL: ERROR
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # -----------------------------------------------------------------------
  # Celery Beat (periodic tasks)
  # -----------------------------------------------------------------------
  celery_beat:
    build: .
    command: celery -A core beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-smpi}:${POSTGRES_PASSWORD:-smpi_dev_password}@postgresql:5432/${POSTGRES_DB:-smpi}
      CELERY_BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER:-smpi}:${RABBITMQ_DEFAULT_PASS:-smpi_rabbit_pass}@rabbitmq:5672/
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-smpi_redis_pass}@redis:6379/0
      REDIS_URL: redis://:${REDIS_PASSWORD:-smpi_redis_pass}@redis:6379/1
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
  evolution_data:
