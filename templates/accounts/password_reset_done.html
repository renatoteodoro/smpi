{% load static %}<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-mail enviado — SMPI</title>
<style>
@font-face{font-family:MuseoSans;font-weight:500;src:url(https://fiesc.com.br/themes/custom/fsi/dist/styles/assets/styleguide/fonts/MuseoSans/MuseoSans_500.otf) format("opentype");font-display:swap;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:MuseoSans,Arial,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;background:hsl(220 74% 33%);padding:1rem;}
.card{background:#fff;padding:2rem;border-radius:20px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);text-align:center;}
.icon{font-size:3rem;margin-bottom:1rem;color:#48bb78;}
h2{color:hsl(220 74% 33%);font-size:1.5rem;margin-bottom:.75rem;}
p{font-size:.9rem;color:#666;line-height:1.7;margin-bottom:1.5rem;}
a{display:inline-block;color:#fff;background:hsl(239,79%,29%);padding:.7rem 2rem;border-radius:30px;text-decoration:none;font-weight:600;font-size:.9rem;}
a:hover{background:#005ca9;}
</style>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
<div class="card" role="main">
  <div class="icon" aria-hidden="true">&#10003;</div>
  <h2>E-mail enviado!</h2>
  <p>
    Se o endereço informado estiver cadastrado no sistema,
    você receberá as instruções de recuperação em instantes.
    Verifique também sua caixa de spam.
  </p>
  <a href="{% url 'accounts:login' %}">Voltar ao login</a>
</div>

<div vw class="enabled">
  <div vw-access-button class="active"></div>
  <div vw-plugin-wrapper><div class="vw-plugin-top-wrapper"></div></div>
</div>
<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
<script>new window.VLibras.Widget('https://vlibras.gov.br/app');</script>
</body>
</html>
