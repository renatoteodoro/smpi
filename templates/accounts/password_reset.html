{% load static %}<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recuperar senha — SMPI</title>
<style>
@font-face{font-family:MuseoSans;font-weight:300;src:url(https://fiesc.com.br/themes/custom/fsi/dist/styles/assets/styleguide/fonts/MuseoSans/MuseoSans-300.otf) format("opentype");font-display:swap;}
@font-face{font-family:MuseoSans;font-weight:500;src:url(https://fiesc.com.br/themes/custom/fsi/dist/styles/assets/styleguide/fonts/MuseoSans/MuseoSans_500.otf) format("opentype");font-display:swap;}
*, *::before, *::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:MuseoSans,Arial,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;background:hsl(220 74% 33%);padding:1rem;}
.card{background:#fff;padding:2rem;border-radius:20px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);}
h2{color:hsl(220 74% 33%);font-size:1.5rem;margin-bottom:.5rem;}
p{font-size:.9rem;color:#666;margin-bottom:1.5rem;line-height:1.6;}
.form-group{margin-bottom:1.25rem;}
label{display:block;font-size:.85rem;font-weight:600;color:#333;margin-bottom:.4rem;}
input[type=email]{width:100%;padding:.7rem 1rem;border:1.5px solid #ddd;border-radius:10px;font-size:1rem;font-family:inherit;}
input[type=email]:focus{outline:none;border-color:hsl(220 74% 33%);box-shadow:0 0 0 3px hsl(212 100% 90%/.5);}
button[type=submit]{background:hsl(239,79%,29%);color:#fff;border:none;padding:.8rem 2rem;border-radius:30px;cursor:pointer;font-size:1rem;font-family:inherit;font-weight:600;width:100%;}
button[type=submit]:hover{background:#005ca9;}
button[type=submit]:focus{outline:3px solid rgba(0,125,250,.7);outline-offset:1px;}
.back-link{display:block;text-align:center;margin-top:1.25rem;font-size:.85rem;color:hsl(220 74% 33%);text-decoration:none;}
.back-link:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="card">
  <h2>Recuperar senha</h2>
  <p>Insira o e-mail cadastrado e enviaremos um link para redefinir sua senha.</p>
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label for="id_email">E-mail</label>
      <input type="email" id="id_email" name="email" autofocus required
             placeholder="seu@email.com" autocomplete="email">
    </div>
    <button type="submit">Enviar link de recuperação</button>
  </form>
  <a href="{% url 'accounts:login' %}" class="back-link">← Voltar ao login</a>
</div>

<div vw class="enabled">
  <div vw-access-button class="active"></div>
  <div vw-plugin-wrapper><div class="vw-plugin-top-wrapper"></div></div>
</div>
<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
<script>new window.VLibras.Widget('https://vlibras.gov.br/app');</script>
</body>
</html>
